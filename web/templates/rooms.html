{{define "rooms.html"}}<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/app.css">
<title>Salas</title>
</head>
<body>
<header>
<a href="/">Salas</a>
</header>
<main>
<div class="page-title">
<div>
<h1>Salas</h1>
<p class="muted">Cadastre os espaços disponíveis para reserva.</p>
</div>
</div>
<section class="card">
<form method="post">
<label>Nome<input name="name" required>
</label>
<div class="grid">
<label>Capacidade<input type="number" min="1" name="capacity" required>
</label>
<label>Localização<input name="location">
</label>
</div>
<label>Recursos<input name="resources" placeholder="TV, projetor, quadro branco">
</label>
<label>Descrição<textarea name="description">
</textarea>
</label>
<button>Cadastrar sala</button>
</form>
</section>{{range .Rooms}}<article class="room">
<strong>{{.Name}}</strong> · {{.Capacity}} pessoas{{if .Location}} · {{.Location}}{{end}}
<br>
<span class="muted">{{.Resources}}</span>
</article>{{else}}
<p class="empty">Nenhuma sala cadastrada.</p>{{end}}
</main>
</body>
</html>{{end}}
